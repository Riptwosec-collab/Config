<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Network Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#020617;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:24px;
  padding:28px;
}

.btn{
  background:#22d3ee;
  color:black;
  padding:12px 20px;
  border-radius:12px;
  font-weight:bold;
  transition:.2s;
}

.btn:hover{
  background:#67e8f9;
}

textarea{
  resize:none;
}

.result-box{
  background:black;
  border:1px solid #1e293b;
  border-radius:18px;
  padding:20px;
  min-height:300px;
  color:#4ade80;
  white-space:pre-wrap;
  overflow:auto;
  font-family:Consolas;
}

.badge{
  background:#111827;
  border:1px solid #334155;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  color:#cbd5e1;
}

</style>
</head>

<body class="p-8">

<div class="max-w-7xl mx-auto">

<a href="./index.html" class="btn inline-block mb-6">
← Back Dashboard
</a>

<div class="card">

<div class="flex flex-col lg:flex-row lg:justify-between gap-4 mb-8">

<div>
<h1 class="text-5xl font-black text-cyan-400 mb-2">
AI Network Assistant
</h1>

<p class="text-slate-400">
Cisco Smart Troubleshooting / Incident Analyzer
</p>
</div>

<div class="flex flex-wrap gap-3">
<div class="badge">ACL Detect</div>
<div class="badge">MAC Drop</div>
<div class="badge">Routing</div>
<div class="badge">SD-WAN</div>
<div class="badge">Interface Error</div>
</div>

</div>

<div class="grid lg:grid-cols-2 gap-8">

<!-- INPUT -->
<div>

<h2 class="text-2xl font-bold mb-4 text-cyan-300">
Paste Command Output
</h2>

<textarea
id="commandInput"
class="w-full h-[420px] bg-black border border-slate-700 rounded-2xl p-5 text-green-400"
placeholder="Paste Cisco command output here..."
></textarea>

<div class="flex gap-4 mt-5 flex-wrap">

<button onclick="analyzeNetwork()" class="btn">
Analyze
</button>

<button onclick="clearAll()" class="btn">
Clear
</button>

<button onclick="loadExample()" class="btn">
Example
</button>

</div>

</div>

<!-- RESULT -->
<div>

<h2 class="text-2xl font-bold mb-4 text-cyan-300">
AI Result
</h2>

<div id="result" class="result-box">
Waiting for analysis...
</div>

</div>

</div>

</div>

</div>

<script>

function analyzeNetwork(){

const input = document.getElementById("commandInput").value.toLowerCase();
const result = document.getElementById("result");

let analysis = `
==============================
🤖 AI NETWORK ANALYSIS
==============================

`;

if(input.trim() === ""){

analysis += `
❌ ไม่พบข้อมูล Command

กรุณาวาง:
- show interfaces
- show logging
- show access-lists
- show ip route
`;

result.innerText = analysis;
return;
}

/* =========================
MAC DROP
========================= */

if(
input.includes("psecure") ||
input.includes("err-disabled") ||
input.includes("security violation")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 MAC ADDRESS DROP
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุ
• Port Security ทำงาน
• MAC เกิน Limit
• Interface Err-disable

📌 คำสั่งตรวจสอบ
show port-security
show interfaces status err-disabled
show mac address-table

📌 วิธีแก้
shutdown
no shutdown

📌 อุปกรณ์
Cisco Switch

`;
}

/* =========================
IP BLOCK
========================= */

if(
input.includes("deny ip") ||
input.includes("access-list") ||
input.includes("acl")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 IP BLOCK / ACL
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุ
• ACL Block
• Firewall Policy Block

📌 คำสั่งตรวจสอบ
show access-lists
show run | sec access-list
show conn

📌 วิธีตรวจสอบ
• ตรวจ deny any any
• ตรวจ NAT
• ตรวจ ACL Order

📌 อุปกรณ์
Router / Firewall

`;
}

/* =========================
INTERFACE ERROR
========================= */

if(
input.includes("crc") ||
input.includes("input errors") ||
input.includes("duplex")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 INTERFACE ERROR
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุ
• Duplex mismatch
• สาย LAN เสีย
• CRC สูง

📌 คำสั่งตรวจสอบ
show interfaces
show interfaces counters errors

📌 วิธีแก้
• เปลี่ยนสาย
• ตรวจ speed/duplex
• ตรวจ SFP

📌 อุปกรณ์
Switch / Router

`;
}

/* =========================
SDWAN
========================= */

if(
input.includes("bfd") ||
input.includes("omp") ||
input.includes("control")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 SD-WAN ISSUE
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุ
• OMP Down
• BFD Down
• WAN ISP Problem

📌 คำสั่งตรวจสอบ
show sdwan bfd sessions
show sdwan omp peers
show sdwan control connections

📌 วิธีตรวจสอบ
• Ping WAN
• ตรวจ ISP
• ตรวจ vSmart

📌 อุปกรณ์
Cisco SD-WAN

`;
}

/* =========================
INTERNET ISSUE
========================= */

if(
input.includes("request timed out") ||
input.includes("destination host unreachable")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 INTERNET ISSUE
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุ
• Gateway Down
• Routing ผิด
• ACL Block
• ISP Down

📌 คำสั่งตรวจสอบ
ping 8.8.8.8
traceroute 8.8.8.8
show ip route
show access-lists

📌 วิธีตรวจสอบ
• Ping Gateway
• ตรวจ DNS
• ตรวจ DHCP

📌 อุปกรณ์
Router / Firewall

`;
}

/* =========================
NO MATCH
========================= */

if(analysis.length < 100){

analysis += `
✅ ไม่พบปัญหาที่ระบบรู้จัก
ลองเพิ่ม command เพิ่มเติม
`;
}

result.innerText = analysis;

}

/* CLEAR */

function clearAll(){

document.getElementById("commandInput").value = "";

document.getElementById("result").innerText =
"Waiting for analysis...";

}

/* EXAMPLE */

function loadExample(){

document.getElementById("commandInput").value = `
%PORT_SECURITY-2-PSECURE_VIOLATION
Interface Gi1/0/5 err-disabled
`;

}

</script>

</body>
</html>
