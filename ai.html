<!-- เพิ่มแทน function analyzeNetwork() เดิม -->

<script>

function analyzeNetwork(){

const input = document.getElementById("commandInput").value.toLowerCase();
const result = document.getElementById("result");

let analysis = `
==============================
🤖 AI NETWORK ANALYSIS
ระบบวิเคราะห์ปัญหา Network อัตโนมัติ
==============================

`;

if(input.trim() === ""){
analysis += `
❌ ไม่พบข้อมูล Command Output

กรุณาวาง:
- show interfaces
- show logging
- show access-lists
- show ip route
- show port-security

แล้วกด Analyze
`;
result.innerText = analysis;
return;
}

/* =========================
MAC DROP
========================= */

if(
input.includes("psecure") ||
input.includes("err-disabled") ||
input.includes("security violation")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: MAC ADDRESS DROP
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุที่เป็นไปได้
• Port Security ทำงาน
• MAC Address เกิน Limit
• มีการเสียบอุปกรณ์ใหม่
• Interface ถูก Err-disable

📌 คำสั่งตรวจสอบ
show port-security
show port-security interface gi1/0/1
show interfaces status err-disabled
show mac address-table
show errdisable recovery

📌 วิธีแก้ไข
interface gi1/0/1
shutdown
no shutdown

หรือเปิด Recovery อัตโนมัติ
errdisable recovery cause psecure-violation

📌 อุปกรณ์ที่ใช้
Cisco Switch

`;
}

/* =========================
IP BLOCK
========================= */

if(
input.includes("deny ip") ||
input.includes("access-list") ||
input.includes("acl")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: IP ถูก Block
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุที่เป็นไปได้
• ACL Block IP
• Firewall Policy Block
• มี deny rule
• NAT ไม่ถูกต้อง

📌 คำสั่งตรวจสอบ
show access-lists
show run | sec access-list
show conn
show logging
show ip nat translations

📌 วิธีตรวจสอบเพิ่มเติม
• ตรวจ deny any any
• เช็คลำดับ ACL
• ตรวจสอบ NAT
• ตรวจสอบ Security Policy

📌 อุปกรณ์ที่ใช้
Router / Firewall

`;
}

/* =========================
INTERFACE ERROR
========================= */

if(
input.includes("crc") ||
input.includes("input errors") ||
input.includes("duplex")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: Interface Error
━━━━━━━━━━━━━━━━━━━━━━

📌 อาการที่พบ
• CRC Error
• Input Error
• Duplex Mismatch
• Packet Drop

📌 สาเหตุที่เป็นไปได้
• สาย LAN เสีย
• SFP มีปัญหา
• Speed/Duplex ไม่ตรงกัน
• Interface ใช้งานหนัก

📌 คำสั่งตรวจสอบ
show interfaces
show interfaces counters errors
show controllers ethernet-controller

📌 วิธีแก้ไข
• เปลี่ยนสาย LAN
• ตรวจ Speed/Duplex
• เปลี่ยน SFP
• เช็ค Utilization

📌 อุปกรณ์ที่ใช้
Router / Switch

`;
}

/* =========================
SDWAN
========================= */

if(
input.includes("bfd") ||
input.includes("omp") ||
input.includes("control connections")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: SD-WAN DOWN
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุที่เป็นไปได้
• BFD Down
• OMP Peer หลุด
• Control Connection Down
• ISP มีปัญหา

📌 คำสั่งตรวจสอบ
show sdwan bfd sessions
show sdwan omp peers
show sdwan control connections

📌 วิธีตรวจสอบเพิ่มเติม
• Ping WAN Gateway
• ตรวจ Certificate
• ตรวจ vSmart Reachable
• ตรวจ Internet ISP

📌 อุปกรณ์ที่ใช้
Cisco SD-WAN Edge

`;
}

/* =========================
INTERFACE DOWN
========================= */

if(
input.includes("administratively down") ||
input.includes("line protocol down")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: Interface Down
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุที่เป็นไปได้
• Port Shutdown
• สาย LAN หลุด
• SFP ไม่ทำงาน
• VLAN ผิด

📌 คำสั่งตรวจสอบ
show ip interface brief
show interfaces status
show logging

📌 วิธีแก้ไข
interface gi1/0/1
no shutdown

📌 ตรวจสอบเพิ่มเติม
• เช็คสาย
• เช็ค VLAN
• เช็ค Switch Port

`;
}

/* =========================
PING FAIL
========================= */

if(
input.includes("request timed out") ||
input.includes("destination host unreachable")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: ใช้งาน Internet ไม่ได้
━━━━━━━━━━━━━━━━━━━━━━

📌 สาเหตุที่เป็นไปได้
• Gateway Down
• VLAN ผิด
• ACL Block
• Routing ผิด
• ISP Down

📌 คำสั่งตรวจสอบ
ping 8.8.8.8
traceroute 8.8.8.8
show arp
show ip route
show access-lists

📌 วิธีตรวจสอบ
• Ping Gateway
• ตรวจ DHCP
• ตรวจ DNS
• ตรวจ Firewall

📌 อุปกรณ์ที่ใช้
Router / Firewall / Switch

`;
}

/* =========================
CPU HIGH
========================= */

if(
input.includes("cpu") ||
input.includes("high cpu")
){

analysis += `

━━━━━━━━━━━━━━━━━━━━━━
🚨 พบปัญหา: CPU สูง
━━━━━━━━━━━━━━━━━━━━━━

📌 คำสั่งตรวจสอบ
show processes cpu
show processes cpu history
show memory statistics

📌 สาเหตุที่เป็นไปได้
• Broadcast Storm
• Loop Network
• Traffic สูง
• Process ค้าง

📌 วิธีแก้
• ตรวจ STP
• ตรวจ Loop
• Restart Process
• ตรวจ Traffic

`;
}

/* =========================
NO MATCH
========================= */

if(analysis.includes("ระบบวิเคราะห์ปัญหา") && analysis.length < 200){

analysis += `

✅ ไม่พบปัญหาที่ระบบรู้จัก

ลองเพิ่ม Command:
• show interfaces
• show logging
• show access-lists
• show ip route
• show port-security

เพื่อให้ AI วิเคราะห์ได้ละเอียดขึ้น
`;
}

result.innerText = analysis;

}

</script>
